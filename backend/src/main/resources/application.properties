# ===========================================
# APPLICATION
# ===========================================
spring.application.name=ai-knowledge-base
server.port=8080

# ===========================================
# PostgreSQL DB
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/akb_db
spring.datasource.username=akb_user
spring.datasource.password=akb_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ===========================================
# JPA / HIBERNATE
# ===========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================
# FLYWAY
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===========================================
# REDIS
# ===========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ===========================================
# JWT
# ===========================================
app.jwt.secret=YWtiX3N1cGVyX3NlY3JldF9rZXlfZm9yX2p3dF9hdXRoZW50aWNhdGlvbl8yMDI1
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ===========================================
# UPLOAD FILES
# ===========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/

# ===========================================
# AI SERVICE
# ===========================================
app.ai-service.url=http://localhost:8000

# ===========================================
# DOCKER
# ===========================================
spring.docker.compose.enabled=false

# ===========================================
# LOGS
# ===========================================
logging.level.com.akb=DEBUG
logging.level.org.springframework.security=DEBUG